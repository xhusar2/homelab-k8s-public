apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prom
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 85.1.2
      helm:
        releaseName: kube-prom
        valueFiles:
          - $values/config/examples/monitoring/kube-prometheus-stack-values.yaml
    - repoURL: https://github.com/GITHUB_ORG_PLACEHOLDER/homelab-k8s-public.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
