apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: steam-idler
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GITHUB_ORG_PLACEHOLDER/homelab-k8s-public.git
    targetRevision: HEAD
    path: charts/steam-idler
  destination:
    server: https://kubernetes.default.svc
    namespace: gaming
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
