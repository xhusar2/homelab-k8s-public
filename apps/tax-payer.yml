apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tax-payer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GITHUB_ORG_PLACEHOLDER/homelab-k8s-public.git
    targetRevision: HEAD
    path: charts/tax_payer
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
