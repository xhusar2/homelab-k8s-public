apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard-gateway
  namespace: edge-gateway
  labels:
    app: wireguard-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wireguard-gateway
  template:
    metadata:
      labels:
        app: wireguard-gateway
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
      containers:
        - name: wireguard
          image: lscr.io/linuxserver/wireguard:latest
          command: ["/bin/bash", "/scripts/gateway.sh"]
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
            allowPrivilegeEscalation: false
            runAsUser: 0
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: wg-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: edge-gateway-config
            defaultMode: 0755
        - name: wg-config
          secret:
            secretName: wg-gateway-config
            defaultMode: 0400
            items:
              - key: wg0.conf
                path: wg0.conf
