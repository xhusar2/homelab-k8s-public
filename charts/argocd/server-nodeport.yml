# External access to the Argo CD UI/API without kubectl port-forward.
# https://<any-node-ip>:30443  (LAN or Headscale-routed node addresses)
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-external
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server-external
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8080
      nodePort: 30443
